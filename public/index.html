<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>易班自动签到</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,.08);padding:32px 24px;width:100%;max-width:440px;margin:16px;max-height:95vh;overflow-y:auto}
h2{text-align:center;color:#1a1a1a;margin-bottom:8px;font-size:22px}
.subtitle{text-align:center;color:#999;font-size:13px;margin-bottom:24px}
.form-group{margin-bottom:16px}
label{display:block;margin-bottom:6px;color:#555;font-size:14px;font-weight:500}
input,select{width:100%;padding:11px 12px;border:1px solid #d9d9d9;border-radius:8px;font-size:15px;outline:none;transition:border .2s;background:#fff}
input:focus,select:focus{border-color:#4a90d9}
button{width:100%;padding:12px;background:#4a90d9;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;transition:background .2s;font-weight:500}
button:hover{background:#3a7bc8}
button:disabled{background:#b0c4de;cursor:not-allowed}
button.secondary{background:#fff;color:#4a90d9;border:1px solid #4a90d9;margin-top:8px}
button.secondary:hover{background:#f0f6ff}
button.danger{background:#fff;color:#e74c3c;border:1px solid #e74c3c;margin-top:12px}
button.danger:hover{background:#fef0ef}
#status{margin-top:16px;padding:12px;border-radius:8px;font-size:14px;display:none;white-space:pre-wrap}
#status.loading{display:block;background:#e8f4fd;color:#1a73e8}
#status.success{display:block;background:#e6f9e6;color:#2e7d32}
#status.error{display:block;background:#fdecea;color:#c62828}
#page-login{display:block}
#page-checkin{display:none}
.weekday-group{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.weekday-btn{width:38px;height:38px;border-radius:50%;border:1px solid #d9d9d9;background:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.weekday-btn.active{background:#4a90d9;color:#fff;border-color:#4a90d9}
.section-title{font-size:14px;color:#333;font-weight:500;margin:20px 0 8px;padding-top:16px;border-top:1px solid #f0f0f0}
.saved-badge{display:inline-block;background:#e6f9e6;color:#2e7d32;font-size:12px;padding:2px 8px;border-radius:10px;margin-left:8px}
.forget-link{text-align:center;margin-top:18px;font-size:13px;color:#999}
.forget-link a{color:#4a90d9;text-decoration:none}
.toggle-switch{position:relative;display:inline-block;width:48px;height:26px;vertical-align:middle;margin-right:8px}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#ccc;border-radius:26px;transition:.3s}
.toggle-slider:before{position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background-color:#fff;border-radius:50%;transition:.3s}
input:checked+.toggle-slider{background-color:#4a90d9}
input:checked+.toggle-slider:before{transform:translateX(22px)}
.toggle-label{display:flex;align-items:center;font-size:14px;font-weight:500;color:#555;cursor:pointer}
.auto-detail{margin-top:12px;padding:12px;background:#f8f9fa;border-radius:8px;display:none}
.auto-detail.show{display:block}
.auto-hint{font-size:12px;color:#999;margin-top:4px}
.log-panel{margin-top:20px;padding:16px;border:1px solid #e0e0e0;border-radius:8px}
.log-panel .log-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.log-panel .log-header:hover{opacity:0.8}
.log-panel .log-title{font-size:14px;font-weight:500;color:#333}
.log-panel .log-arrow{font-size:16px;color:#4a90d9;transition:transform .3s;font-weight:bold}
.log-panel .log-arrow.open{transform:rotate(180deg)}
.log-body{display:none;margin-top:12px;max-height:220px;overflow-y:auto}
.log-body.show{display:block}
.log-item{padding:8px 10px;border-radius:6px;font-size:13px;margin-bottom:6px;background:#fafafa;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.log-item .log-info{flex:1;min-width:0}
.log-item.success{border-left:3px solid #2e7d32}.log-item.success .log-result{color:#2e7d32}
.log-item.fail{border-left:3px solid #c62828}.log-item.fail .log-result{color:#c62828}
.log-item.pending{border-left:3px solid #e67e22}.log-item.pending .log-result{color:#e67e22}
.log-item.unknown{border-left:3px solid #3498db}.log-item.unknown .log-result{color:#3498db}
.log-item .log-time{font-size:12px;color:#999;margin-top:2px}
.log-item .log-type{font-size:11px;padding:1px 6px;border-radius:4px;margin-right:6px}
.log-item .log-type.auto{background:#e8f4fd;color:#1a73e8}
.log-item .log-type.manual{background:#fff3e0;color:#e65100}
.log-item .log-result{font-weight:500}
.log-item .log-del{flex-shrink:0;font-size:12px;color:#ccc;cursor:pointer;padding:2px 6px;border-radius:4px;border:1px solid #eee;background:#fff}
.log-item .log-del:hover{color:#e74c3c;border-color:#e74c3c}
.log-empty{text-align:center;color:#ccc;font-size:13px;padding:12px}
#login-status{padding:10px;border-radius:6px;font-size:14px;display:none;text-align:center;margin-top:12px}
#login-status.error{display:block;color:#c62828;background:#fdecea}
#login-status.loading{display:block;color:#1a73e8;background:#e8f4fd}
</style>
</head>
<body>
<div class="card" id="page-login">
  <h2>登录易班账号</h2>
  <p class="subtitle">验证成功后即可使用异地签到</p>
  <div class="form-group"><label>手机号</label><input type="tel" id="login-phone" placeholder="请输入易班手机号" autocomplete="tel"></div>
  <div class="form-group"><label>密码</label><input type="password" id="login-password" placeholder="请输入密码" autocomplete="current-password"></div>
  <button id="login-btn" onclick="doLogin()">验证并登录</button>
  <div id="login-status"></div>
  <p class="forget-link"><a href="https://www.yiban.cn/user/forget/index" target="_blank">如忘记密码可点击这里进入易班官网修改密码</a></p>
</div>
<div class="card" id="page-checkin">
  <h2>易班晚点签到 <span class="saved-badge" id="saved-badge" style="display:none">已保存</span></h2>
  <p class="subtitle" id="user-info"></p>
  <div class="form-group"><label>签到校区</label><select id="campus-select"><!--__CAMPUS_OPTIONS__--></select></div>
  
  <div class="form-group">
    <label class="toggle-label" onclick="toggleAuto()"><span class="toggle-switch"><input type="checkbox" id="auto-toggle" onchange="toggleAuto()"><span class="toggle-slider"></span></span><span>是否需要自动签到</span></label>
    <p class="auto-hint">开启自动签到后系统将会在相应日期的晚上9点自动完成签到</p>
    <div class="auto-detail" id="auto-detail">
      <label>重复日期</label>
      <div class="weekday-group" id="weekday-group"><div class="weekday-btn" data-day="1">一</div>
<div class="weekday-btn" data-day="2">二</div>
<div class="weekday-btn" data-day="3">三</div>
<div class="weekday-btn" data-day="4">四</div>
<div class="weekday-btn" data-day="5">五</div>
<div class="weekday-btn" data-day="6">六</div>
<div class="weekday-btn" data-day="0">日</div>
</div></div></div>
  <button id="save-btn" class="secondary" onclick="saveSettings()">保存设置</button>
  <button id="checkin-btn" onclick="doCheckin()" style="margin-top:16px">执行签到</button>
  <div class="log-panel"><div class="log-header" onclick="toggleLog()"><span class="log-title">查看签到日志</span><span class="log-arrow" id="log-arrow">▼</span></div><div class="log-body" id="log-body"><div class="log-empty" id="log-empty">无签到记录</div></div></div>
  <button id="logout-btn" class="danger" onclick="doLogout()">退出登录</button>
  <div id="status"></div>
</div>
<script>
var CAMPUSES=/*__CAMPUS_DATA__*/;
var currentUser=null;

function getLogClass(it){var m=it.msg||'',s=it.success;if(s&&m.indexOf('未达')<0)return'success';if(m.indexOf('未达')>=0)return'pending';if(!s)return'fail';return'unknown'}
function getLogLabel(it){var c=getLogClass(it);if(c==='success')return'成功';if(c==='pending')return'未达签到时段';if(c==='fail')return'失败';return'未知'}

document.querySelectorAll('.weekday-btn').forEach(function(b){b.addEventListener('click',function(){this.classList.toggle('active')})});

(function(){var s=localStorage.getItem('yiban_user');if(s){try{currentUser=JSON.parse(s);document.getElementById('login-phone').value=currentUser.phone||'';document.getElementById('login-password').value=currentUser.password||''}catch(e){}}document.getElementById('page-login').style.display='block';document.getElementById('page-checkin').style.display='none'})();

function toggleAuto(){var c=document.getElementById('auto-toggle'),d=document.getElementById('auto-detail');d.classList.toggle('show',c.checked)}
function toggleLog(){var b=document.getElementById('log-body'),a=document.getElementById('log-arrow');b.classList.toggle('show');a.classList.toggle('open');if(b.classList.contains('show'))loadLogs()}

async function loadLogs(){
  try{var r=await fetch('/api/logs?phone='+(currentUser?currentUser.phone:''));var d=await r.json();if(d.logs)renderLogs(d.logs)}catch(e){}
}

async function delLog(idx){
  try{var r=await fetch('/api/logs/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:currentUser.phone,index:idx})});var d=await r.json();if(d.success)loadLogs()}catch(e){}
}

function renderLogs(logs){
  var b=document.getElementById('log-body'),e=document.getElementById('log-empty');
  e.style.display=logs&&logs.length?'none':'block';
  b.querySelectorAll('.log-item').forEach(function(x){x.remove()});
  if(!logs||!logs.length)return;
  for(var i=0;i<logs.length;i++){
    var l=logs[i],idx=i,div=document.createElement('div'),cls=getLogClass(l);
    div.className='log-item '+cls;
    var tl=l.type==='auto'?'自动':'手动',tc=l.type==='auto'?'auto':'manual',lb=getLogLabel(l);
    div.innerHTML='<div class=log-info><span class=log-type '+tc+'>'+tl+'</span><span class=log-result>'+lb+'</span><div class=log-time>'+l.date+' '+l.time+'</div></div><span class=log-del onclick="event.stopPropagation();delLog('+idx+')">删除</span>';
    b.appendChild(div);
  }
}

async function doLogin(){
  var b=document.getElementById('login-btn'),s=document.getElementById('login-status');
  var p=document.getElementById('login-phone').value.trim(),w=document.getElementById('login-password').value;
  if(!p||!w){s.className='error';s.style.display='block';s.textContent='请输入手机号和密码';return}
  b.disabled=true;s.className='loading';s.style.display='block';s.textContent='正在验证账号密码...';
  if(p==='123'&&w==='456'){
    s.style.display='none';
    currentUser={phone:p,password:w,whitelist:true};
    localStorage.setItem('yiban_user',JSON.stringify(currentUser));
    document.getElementById('user-info').textContent='账号：'+p+' (白名单)';
    document.getElementById('page-login').style.display='none';
    document.getElementById('page-checkin').style.display='block';
    b.disabled=false;return;
  }
  try{
    var r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:p,password:w})});
    var d=await r.json();
    if(d.success){
      s.style.display='none';currentUser={phone:p,password:w};
      localStorage.setItem('yiban_user',JSON.stringify(currentUser));
      document.getElementById('user-info').textContent='账号：'+p;
      if(d.settings)loadSettings(d.settings);
      document.getElementById('page-login').style.display='none';
      document.getElementById('page-checkin').style.display='block';
    }else{s.className='error';s.style.display='block';s.textContent=d.msg||'登录失败'}
  }catch(e){s.className='error';s.style.display='block';s.textContent='网络错误，请重试'}
  finally{b.disabled=false}
}

function loadSettings(st){
  if(st.campus)document.getElementById('campus-select').value=st.campus;
  document.getElementById('auto-toggle').checked=!!st.autoEnabled;toggleAuto();
  if(st.days)document.querySelectorAll('.weekday-btn').forEach(function(b){var d=parseInt(b.dataset.day);b.classList.toggle('active',st.days.includes(d))})
}

async function saveSettings(){
  if(!currentUser)return;
  var b=document.getElementById('save-btn'),g=document.getElementById('saved-badge');
  var c=document.getElementById('campus-select').value,a=document.getElementById('auto-toggle').checked,ds=[];
  document.querySelectorAll('.weekday-btn.active').forEach(function(x){ds.push(parseInt(x.dataset.day))});
  b.disabled=true;
  try{var r=await fetch('/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:currentUser.phone,password:currentUser.password,campus:c,days:ds,autoEnabled:a})});var j=await r.json();if(j.success){g.style.display='inline-block';setTimeout(function(){g.style.display='none'},2000)}}catch(e){console.error(e)}finally{b.disabled=false}
}

async function doCheckin(){
  if(!currentUser)return;
  if(currentUser.whitelist){var s=document.getElementById('status');s.className='loading';s.style.display='block';s.textContent='白名单账号仅用于浏览，无法执行签到';setTimeout(function(){s.style.display='none'},3000);return}
  var b=document.getElementById('checkin-btn'),s=document.getElementById('status'),c=document.getElementById('campus-select').value,o=CAMPUSES[c];
  if(o.lat===null||o.lng===null){s.className='error';s.style.display='block';s.textContent='该校区暂未配置签到坐标';return}
  b.disabled=true;s.className='loading';s.style.display='block';s.textContent='正在执行签到...';
  try{
    var r=await fetch('/api/checkin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:currentUser.phone,password:currentUser.password,lat:String(o.lat),lng:String(o.lng)})});
    var d=await r.json();
    s.className=d.success?'success':'error';
    s.textContent=(d.success?'签到结果: ':'签到失败: ')+d.msg+'\n状态码: '+d.state+'\n设备识别: '+(d.deviceState?'已通过':'未通过');
  }catch(e){s.className='error';s.textContent='请求失败: '+e.message}finally{b.disabled=false}
}

function doLogout(){
  currentUser=null;localStorage.removeItem('yiban_user');
  document.getElementById('login-phone').value='';document.getElementById('login-password').value='';
  var ls=document.getElementById('login-status');ls.className='';ls.style.display='none';
  document.getElementById('status').style.display='none';
  document.getElementById('page-login').style.display='block';
  document.getElementById('page-checkin').style.display='none';
  document.getElementById('log-body').classList.remove('show');
}
</script>
</body>
</html>
