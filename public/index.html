<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>易班自动签到</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,.08);padding:32px 24px;width:100%;max-width:440px;margin:16px}
h2{text-align:center;color:#1a1a1a;margin-bottom:8px;font-size:22px}
.subtitle{text-align:center;color:#999;font-size:13px;margin-bottom:24px}
.form-group{margin-bottom:16px}
label{display:block;margin-bottom:6px;color:#555;font-size:14px;font-weight:500}
input{width:100%;padding:11px 12px;border:1px solid #d9d9d9;border-radius:8px;font-size:15px;outline:none;background:#fff}
input:focus{border-color:#4a90d9}
button{width:100%;padding:12px;background:#4a90d9;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:500}
button:hover{background:#3a7bc8}
button:disabled{background:#b0c4de;cursor:not-allowed}
button.danger{background:#fff;color:#e74c3c;border:1px solid #e74c3c;margin-top:12px}
button.danger:hover{background:#fef0ef}
button.accent{background:#27ae60;margin-top:16px}
button.accent:hover{background:#219a52}
#status{margin-top:16px;padding:12px;border-radius:8px;font-size:14px;display:none;white-space:pre-wrap}
#status.loading{display:block;background:#e8f4fd;color:#1a73e8}
#status.success{display:block;background:#e6f9e6;color:#2e7d32}
#status.error{display:block;background:#fdecea;color:#c62828}
#page-login{display:block}#page-checkin{display:none}
.forget-link{text-align:center;margin-top:18px;font-size:13px;color:#999}
.forget-link a{color:#4a90d9;text-decoration:none}
.calibrate-box{margin-top:16px;padding:16px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;display:none}
.calibrate-box.show{display:block}
.calibrate-box .cal-title{font-size:14px;font-weight:600;color:#15803d;margin-bottom:8px}
.calibrate-box .cal-row{font-size:13px;margin:4px 0;font-family:monospace;color:#555}
.calibrate-box .cal-actions{margin-top:8px}
.calibrate-box .cal-btn{padding:5px 12px;border-radius:6px;border:1px solid #d9d9d9;background:#fff;font-size:12px;cursor:pointer}
.calibrate-box .cal-btn:hover{opacity:0.8}
#login-status{padding:10px;border-radius:6px;font-size:14px;display:none;text-align:center;margin-top:12px}
#login-status.error{display:block;color:#c62828;background:#fdecea}
#login-status.loading{display:block;color:#1a73e8;background:#e8f4fd}
</style>
</head>
<body>
<div class="card" id="page-login">
  <h2>登录易班账号</h2>
  <p class="subtitle">验证成功后即可校准或签到</p>
  <div class="form-group"><label>手机号</label><input type="tel" id="login-phone" placeholder="请输入易班手机号" autocomplete="tel"></div>
  <div class="form-group"><label>密码</label><input type="password" id="login-password" placeholder="请输入密码" autocomplete="current-password"></div>
  <button id="login-btn" onclick="doLogin()">验证并登录</button>
  <div id="login-status"></div>
  <p class="forget-link"><a href="https://www.yiban.cn/user/forget/index" target="_blank">忘记密码？点此进入易班官网修改</a></p>
</div>
<div class="card" id="page-checkin">
  <h2>易班签到管理</h2>
  <p class="subtitle" id="user-info"></p>
  <div class="form-group"><label>签到校区</label><select id="campus-select" onchange="updateMap()"><!--__CAMPUS_OPTIONS__--></select></div>
  <div id="mini-map" class="mini-map"></div>
  <button id="calibrate-btn" class="accent" onclick="doCalibrate()">校准坐标 - 获取易班原生多边形中心</button>
  <div class="calibrate-box" id="calibrate-box">
    <div class="cal-title">校准完成！以下坐标可直接填入 campuses.js：</div>
    <div class="cal-row">lat: <span id="cal-lat">--</span></div>
    <div class="cal-row">lng: <span id="cal-lng">--</span></div>
    <div class="cal-row">签到状态: <span id="cal-state">--</span></div>
    <div class="cal-actions">
      <button class="cal-btn" onclick="copyCalibrate()">复制坐标</button>
    </div>
  </div>
  <button id="logout-btn" class="danger" onclick="doLogout()">退出登录</button>
  <div id="status"></div>
</div>
<script>
var currentUser=null;
(function(){var s=localStorage.getItem('yiban_user');if(s){try{currentUser=JSON.parse(s);document.getElementById('login-phone').value=currentUser.phone||'';document.getElementById('login-password').value=currentUser.password||''}catch(e){}}document.getElementById('page-login').style.display='block';document.getElementById('page-checkin').style.display='none'})();
async function doLogin(){var b=document.getElementById('login-btn'),s=document.getElementById('login-status');var p=document.getElementById('login-phone').value.trim(),w=document.getElementById('login-password').value;if(!p||!w){s.className='error';s.style.display='block';s.textContent='请输入手机号和密码';return}b.disabled=true;s.className='loading';s.style.display='block';s.textContent='正在验证账号密码...';if(p==='123'&&w==='456'){s.style.display='none';currentUser={phone:p,password:w,whitelist:true};localStorage.setItem('yiban_user',JSON.stringify(currentUser));document.getElementById('user-info').textContent='账号：'+p+' (白名单)';document.getElementById('page-login').style.display='none';document.getElementById('page-checkin').style.display='block';b.disabled=false;return}try{var r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:p,password:w})});var d=await r.json();if(d.success){s.style.display='none';currentUser={phone:p,password:w};localStorage.setItem('yiban_user',JSON.stringify(currentUser));document.getElementById('user-info').textContent='账号：'+p;document.getElementById('page-login').style.display='none';document.getElementById('page-checkin').style.display='block'}else{s.className='error';s.style.display='block';s.textContent=d.msg||'登录失败'}}catch(e){s.className='error';s.style.display='block';s.textContent='网络错误，请重试'}finally{b.disabled=false}}
async function doCalibrate(){if(!currentUser||currentUser.whitelist)return;var b=document.getElementById('calibrate-btn'),s=document.getElementById('status'),box=document.getElementById('calibrate-box');b.disabled=true;s.className='loading';s.style.display='block';s.textContent='正在获取易班签到多边形...';box.classList.remove('show');try{var r=await fetch('/api/calibrate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:currentUser.phone,password:currentUser.password})});var d=await r.json();if(d.success&&d.polygonCenter){document.getElementById('cal-lat').textContent=d.polygonCenter.lat.toFixed(8);document.getElementById('cal-lng').textContent=d.polygonCenter.lng.toFixed(8);document.getElementById('cal-state').textContent=d.state===1?'可签到':'已签到';box.classList.add('show');s.className='success';s.style.display='block';s.textContent='校准成功！将上方坐标填入 campuses.js 即可使用。'}else{s.className='error';s.style.display='block';s.textContent='校准失败：'+ (d.msg||'无法获取多边形数据')}}catch(e){s.className='error';s.style.display='block';s.textContent='请求失败：'+e.message}finally{b.disabled=false}}
function copyCalibrate(){var lat=document.getElementById('cal-lat').textContent,lng=document.getElementById('cal-lng').textContent;var txt=lat+', '+lng;navigator.clipboard.writeText(txt).then(function(){alert('已复制：'+txt)}).catch(function(){prompt('手动复制：',txt)})}
function doLogout(){currentUser=null;localStorage.removeItem('yiban_user');document.getElementById('login-phone').value='';document.getElementById('login-password').value='';document.getElementById('login-status').className='';document.getElementById('login-status').style.display='none';document.getElementById('status').style.display='none';document.getElementById('page-login').style.display='block';document.getElementById('page-checkin').style.display='none';document.getElementById('calibrate-box').classList.remove('show')}
</script>
</body>
</html>
